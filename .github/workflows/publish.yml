name: Publish npm

# Publishes when you create a GitHub Release (tag should match package.json, e.g. v0.7.0).
#
# Preferred auth: npm Trusted Publishing (OIDC) — no NPM_TOKEN secret.
# Fallback: repository secret NPM_TOKEN (granular token with "Bypass 2FA").
# See docs/PUBLISH.md.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing / provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Trusted Publishing needs Node >= 22.14 and npm >= 11.5.1
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Publish to npm
        run: npm publish --access public
        env:
          # Optional fallback if Trusted Publishing is not configured yet.
          # Leave unset when using OIDC only.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
