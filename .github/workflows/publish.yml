name: Publish npm

# Publishes when you create a GitHub Release (tag should match package.json version, e.g. v0.7.0).
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance / trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          # Required until/unless Trusted Publishing is configured on npmjs.com
          # (see docs/PUBLISH.md). Granular access token with "publish" on this package.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
