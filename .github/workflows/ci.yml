name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm test

  smoke:
    needs: test
    runs-on: ubuntu-latest
    env:
      WEBDOT_HOME: ${{ runner.temp }}/webdot-home
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: CLI help
        run: node dist/cli.js --help
      - name: Install bundled GenerateMetaTs into user registry
        run: node dist/cli.js plugin install ./plugins/GenerateMetaTs
      - name: List installed plugins
        run: node dist/cli.js plugin list
      - name: Run GenerateMetaTs (dry-run) against fixture seed
        run: >
          node dist/cli.js plugin run GenerateMetaTs
          --seed StateMachine
          -C test/fixtures/sample-project
          --artifacts-out ${{ runner.temp }}/meta-out
          --dry-run
      - name: Confirm artifact was written
        run: test -f "${{ runner.temp }}/meta-out/meta.ts"
